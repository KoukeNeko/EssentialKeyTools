name: Play AAB

# Build a signed Android App Bundle (.aab) for uploading to Google Play, on demand.
# Google Play requires an AAB (not an APK); this reuses the same signing keystore, restored from
# repository secrets, as the release workflow. The bundle is uploaded as a build artifact — it is a
# Play upload artifact, not an installable file, so it is deliberately not attached to a GitHub release.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Recreate the gitignored keystore + keystore.properties that app/build.gradle.kts reads.
      - name: Restore the signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p app/keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore/release.jks
          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > app/keystore.properties

      - name: Build the signed release bundle
        run: ./gradlew bundleRelease --stacktrace

      - name: Remove signing material from the workspace
        if: always()
        run: rm -f app/keystore/release.jks app/keystore.properties

      - name: Upload the AAB
        uses: actions/upload-artifact@v4
        with:
          name: essential-key-tools-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
