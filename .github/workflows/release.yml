name: Release

# On a version tag (e.g. v1.1) build a signed release APK + AAB and publish them to a GitHub release.
# The AAB is the Google Play upload bundle; the APK is for sideloading / F-Droid / IzzyOnDroid.
# Can also be run manually (workflow_dispatch) against an existing tag to rebuild/replace its assets.
# The signing keystore and passwords come from repository secrets, so the private key never lives in
# the repository: RELEASE_KEYSTORE_BASE64 / RELEASE_STORE_PASSWORD / RELEASE_KEY_PASSWORD / RELEASE_KEY_ALIAS.
# Optional VT_API_KEY and KOODOUS_TOKEN secrets submit the public release APK for security analysis.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish (e.g. v1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Resolve the tag from either the push ref or the manual input, and validate it before it is
      # used as a git ref or in the shell so a crafted value cannot be interpreted as a command.
      - name: Resolve the tag and derive the version
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          # Require v<major>.<minor>[.<patch>] (optionally a -prerelease suffix) so the version code
          # can be derived, and to reject anything unexpected before using it as a ref / in the shell.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must look like v1.2 or v1.2.3: $TAG" >&2
            exit 1
          fi
          VERSION_NAME="${TAG#v}"
          CORE="${VERSION_NAME%%-*}"
          IFS='.' read -r MAJ MIN PAT <<< "$CORE"
          VERSION_CODE=$(( 10#$MAJ * 10000 + 10#${MIN:-0} * 100 + 10#${PAT:-0} ))
          {
            echo "tag=$TAG"
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG -> versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      # Match the JBR the project builds with locally (Android Studio ships JDK 21).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Recreate the gitignored keystore + keystore.properties that app/build.gradle.kts reads.
      # Secrets are passed through env (never interpolated into the script) and masked in logs.
      - name: Restore the signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p app/keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore/release.jks
          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > app/keystore.properties

      - name: Build the signed release APK and AAB
        env:
          VERSION_NAME: ${{ steps.resolve.outputs.version_name }}
          VERSION_CODE: ${{ steps.resolve.outputs.version_code }}
        run: ./gradlew assembleRelease bundleRelease -PversionName="$VERSION_NAME" -PversionCode="$VERSION_CODE" --stacktrace

      - name: Remove signing material from the workspace
        if: always()
        run: rm -f app/keystore/release.jks app/keystore.properties

      # Scanning is best-effort: a provider outage or missing optional secret must not block release.
      - name: Submit signed APK for security analysis
        id: security_scan
        continue-on-error: true
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          KOODOUS_TOKEN: ${{ secrets.KOODOUS_TOKEN }}
        run: bash scripts/submit-security-analysis.sh app/build/outputs/apk/release/app-release.apk

      # Create the release for this tag, or attach to it if it already exists (clobbering the asset).
      # TAG comes through env so a crafted tag name cannot be interpreted as a shell command.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
          APK_SHA256: ${{ steps.security_scan.outputs.sha256 }}
          VIRUSTOTAL_STATUS: ${{ steps.security_scan.outputs.virustotal_status }}
          VIRUSTOTAL_REPORT_URL: ${{ steps.security_scan.outputs.virustotal_report_url }}
          KOODOUS_STATUS: ${{ steps.security_scan.outputs.koodous_status }}
          KOODOUS_REPORT_URL: ${{ steps.security_scan.outputs.koodous_report_url }}
        run: |
          APK="EssentialKeyTools-${TAG}.apk"
          AAB="EssentialKeyTools-${TAG}.aab"
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          cp app/build/outputs/bundle/release/app-release.aab "$AAB"
          # Prefer version-specific detailed notes for GitHub. Play's short "what's new" text has a
          # different audience and length limit, so it is only the fallback for older releases.
          # --generate-notes is not used: with direct-to-main commits and no PRs it produces nothing.
          NOTES="$(mktemp)"
          RELEASE_NOTES="distribution/release-notes/${TAG}.md"
          if [ -f "$RELEASE_NOTES" ]; then
            cat "$RELEASE_NOTES" > "$NOTES"
          else
            cat distribution/whatsnew/whatsnew-en-US > "$NOTES"
          fi
          {
            printf '\n## Security analysis\n\n'
            if [ -n "$APK_SHA256" ]; then
              printf 'Signed APK SHA-256: `%s`\n\n' "$APK_SHA256"
              if [ -n "$VIRUSTOTAL_REPORT_URL" ]; then
                printf -- '- [VirusTotal](%s): `%s`\n' "$VIRUSTOTAL_REPORT_URL" "$VIRUSTOTAL_STATUS"
              else
                printf -- '- VirusTotal: `%s`\n' "${VIRUSTOTAL_STATUS:-unavailable}"
              fi
              if [ -n "$KOODOUS_REPORT_URL" ]; then
                printf -- '- [Koodous](%s): `%s`\n' "$KOODOUS_REPORT_URL" "$KOODOUS_STATUS"
              else
                printf -- '- Koodous: `%s`\n' "${KOODOUS_STATUS:-unavailable}"
              fi
            else
              printf 'The security-analysis step did not return results.\n'
            fi
          } >> "$NOTES"
          printf '\n**Full changelog:** %s/%s/commits/%s\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$TAG" >> "$NOTES"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" "$AAB" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Essential Key Tools ${TAG}" --notes-file "$NOTES"
          else
            gh release create "$TAG" "$APK" "$AAB" --repo "$GITHUB_REPOSITORY" \
              --title "Essential Key Tools ${TAG}" --notes-file "$NOTES"
          fi

      # Continuous deployment to Google Play. Runs only when the Play service-account secret is set,
      # so tagging still works before CD is configured. Uploads to the PRODUCTION track as a DRAFT.
      # Play currently requires this app's edits to remain unsent for review, so the release must be
      # submitted from Play Console after CI commits the edit. The Play "what's new" text comes from
      # distribution/whatsnew/whatsnew-<lang>.
      - name: Check for Play credentials
        id: play
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_JSON" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play upload."
          fi

      # upload-google-play publishes the binary and per-version notes, but not the store listing.
      # Supply keeps the Play description in sync with the reviewed disclosure and commits the edit
      # without requesting review, matching the app's current Play Console restriction.
      - name: Set up Ruby for Play metadata
        if: steps.play.outputs.ready == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      # Manual reruns use the latest reviewed listing assets while rebuilding the immutable tag.
      - name: Check out current Play metadata for a manual rerun
        if: steps.play.outputs.ready == 'true' && github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: fastlane/metadata/android
          path: current-play-metadata

      - name: Upload Play store listing metadata
        if: steps.play.outputs.ready == 'true'
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_METADATA_PATH: ${{ github.event_name == 'workflow_dispatch' && 'current-play-metadata/fastlane/metadata/android' || 'fastlane/metadata/android' }}
          VERSION_CODE: ${{ steps.resolve.outputs.version_code }}
        run: |
          JSON_KEY="$RUNNER_TEMP/play-service-account.json"
          trap 'rm -f "$JSON_KEY"' EXIT
          printf '%s' "$PLAY_JSON" > "$JSON_KEY"
          gem install fastlane -v 2.237.0 --no-document
          fastlane supply \
            --json_key "$JSON_KEY" \
            --package_name dev.koukeneko.essentialkeytools \
            --version_code "$VERSION_CODE" \
            --metadata_path "$PLAY_METADATA_PATH" \
            --skip_upload_apk \
            --skip_upload_aab \
            --skip_upload_changelogs \
            --skip_upload_images \
            --changes_not_sent_for_review

      - name: Upload the AAB to Google Play (production track)
        if: steps.play.outputs.ready == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.koukeneko.essentialkeytools
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: draft
          changesNotSentForReview: true
          whatsNewDirectory: distribution/whatsnew
